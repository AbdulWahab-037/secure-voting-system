name: SVV Project CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  validate-structure:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required folders
        run: |
          echo "Checking folders..."
          for folder in requirements z-model vdm-spec alloy-model validation; do
            if [ -d "$folder" ]; then
              echo "✅ $folder found"
            else
              echo "⚠️ $folder not found — skipping"
            fi
          done
          echo "Folder check complete."

      - name: Check required files
        run: |
          echo "Checking files..."
          for file in README.md requirements/SRS.md z-model/voting-system.tex vdm-spec/VotingSystem.vdmsl alloy-model/voting.als; do
            if [ -f "$file" ]; then
              echo "✅ $file found"
            else
              echo "⚠️ $file not found — skipping"
            fi
          done
          echo "File check complete."

      - name: Pipeline summary
        run: |
          echo "================================"
          echo "  SVV CI Pipeline — Complete   "
          echo "  Project: Secure Voting System"
          echo "================================"
