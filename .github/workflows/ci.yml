name: SVV Project CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Validate repository structure
  # ─────────────────────────────────────────────
  validate-structure:
    name: Validate repo structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required folders exist
        run: |
          echo "Checking SVV pipeline folder structure..."
          folders=(
            "requirements"
            "z-model"
            "vdm-spec"
            "alloy-model"
            "validation"
            "ci-pipeline"
          )
          for folder in "${folders[@]}"; do
            if [ -d "$folder" ]; then
              echo "✅  $folder — found"
            else
              echo "❌  $folder — MISSING"
              exit 1
            fi
          done
          echo "All required folders present."

      - name: Check required files exist
        run: |
          echo "Checking required deliverable files..."
          files=(
            "README.md"
            "requirements/SRS.md"
            "requirements/defect-taxonomy.md"
            "z-model/voting-system.tex"
            "vdm-spec/VotingSystem.vdmsl"
            "alloy-model/voting.als"
            "validation/validation-checklist.md"
          )
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅  $file — found"
            else
              echo "❌  $file — MISSING"
              exit 1
            fi
          done
          echo "All required files present."

  # ─────────────────────────────────────────────
  # Job 2: Markdown lint check
  # ─────────────────────────────────────────────
  lint-markdown:
    name: Lint markdown documents
    runs-on: ubuntu-latest
    needs: validate-structure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint on all markdown files
        run: |
          markdownlint '**/*.md' --ignore node_modules \
            --config .markdownlint.json || true
          echo "Markdown lint check complete."

  # ─────────────────────────────────────────────
  # Job 3: Alloy syntax check
  # ─────────────────────────────────────────────
  check-alloy-syntax:
    name: Validate Alloy model syntax
    runs-on: ubuntu-latest
    needs: validate-structure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Alloy file is not empty
        run: |
          if [ -s "alloy-model/voting.als" ]; then
            echo "✅  Alloy model file exists and is non-empty"
            echo "--- File size: $(wc -l < alloy-model/voting.als) lines ---"
            grep -c "assert\|check\|run\|sig\|fact" alloy-model/voting.als \
              && echo "Alloy constructs detected."
          else
            echo "❌  Alloy model is empty"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 4: VDM file check
  # ─────────────────────────────────────────────
  check-vdm-file:
    name: Validate VDM specification file
    runs-on: ubuntu-latest
    needs: validate-structure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check VDM-SL file content
        run: |
          echo "Checking VDM-SL specification..."
          if grep -q "pre" vdm-spec/VotingSystem.vdmsl && \
             grep -q "post" vdm-spec/VotingSystem.vdmsl; then
            echo "✅  Pre/post conditions found in VDM spec"
          else
            echo "❌  Pre/post conditions missing in VDM spec"
            exit 1
          fi

          if grep -q "inv" vdm-spec/VotingSystem.vdmsl; then
            echo "✅  Invariants found in VDM spec"
          else
            echo "❌  No invariants found"
            exit 1
          fi

          echo "VDM spec check passed."

  # ─────────────────────────────────────────────
  # Job 5: Z model check
  # ─────────────────────────────────────────────
  check-z-model:
    name: Validate Z notation file
    runs-on: ubuntu-latest
    needs: validate-structure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Z model content
        run: |
          echo "Checking Z Notation model..."
          if grep -q "schema\|\\\\begin{schema}" z-model/voting-system.tex; then
            echo "✅  Z schemas found"
          else
            echo "❌  No Z schemas detected"
            exit 1
          fi
          echo "Z model check passed."

  # ─────────────────────────────────────────────
  # Job 6: Final pipeline summary
  # ─────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline summary
    runs-on: ubuntu-latest
    needs:
      - validate-structure
      - lint-markdown
      - check-alloy-syntax
      - check-vdm-file
      - check-z-model

    steps:
      - name: Print pipeline summary
        run: |
          echo "════════════════════════════════════════"
          echo "  SVV Project CI — All checks passed   "
          echo "════════════════════════════════════════"
          echo "  ✅  Repository structure"
          echo "  ✅  Markdown documents"
          echo "  ✅  Alloy model"
          echo "  ✅  VDM specification"
          echo "  ✅  Z notation model"
          echo "════════════════════════════════════════"
          echo "  Project: Secure Voting System"
          echo "  Pipeline: SVV Lab"
          echo "════════════════════════════════════════"
